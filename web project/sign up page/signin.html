<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./register.css">
    <title>login</title>
</head>
<body>
    <section class="img_slider">
    </section>
    <div class="container">
        <form method="post" action="./TUCKSHOP MANAGER.html">
            <div id="form_header">Tuckshop Sign Up <length><lu></div>
            <div class="row row_grid">
                <input type="text" name="fname" required placeholder="First Name">
                <input type="text" name="lname" required placeholder="Last Name">
            </div>
            <div class="row">
                <input type="number" name="contact" id="" required placeholder="Phone number">
            </div>
            <div class="row row_grid">
                <input type="text" name="OTP" required placeholder="OTP">
                <input type="text" name="password" required placeholder="create password">
            </div>
            <h1 id="hello">Hello </h1>
            <div class="row row_grid">
                <input type="text" name="reg_no" id="reg_no" placeholder="Order Number">
                <select name="stud_type" id="">
                    <option value="1">Tuckshop 1</option>
                    <option value="2">Tuckshop 2</option>
                    <option value="3">Tuckshop 3</option>
                </select>
            </div>
            <div id="stud_type">Membership </div>
            <div class="row row_no_margin">
                <select name="stud_type" id="">
                    <option value="1">New Join</option>
                    <option value="2">Existing</option>
                    <option value="3">Alumini</option>
                </select>
            </div>
            <div class="row">
                <a href="./index.html" id="btn">Register</a>
            </div>
        </form>
    </div>
</body>
</html>
