<!DOCTYPE html>

<head>

    <title>largest checker</title>
</head>

<body>
    <form action="#">
        <label for="num">Enter number 1</label>
        <input id="num1" type="text"><br>
        <label for="num">Enter number 2</label>
        <input id="num2" type="text"><br>
        <label for="num">Enter number 3</label>
        <input id="num3" type="text"><br>
        <button onclick="myfun();">
            Calculate
        </button>
    </form>

    <script>

        function myfun() {

            var num1 = Number(document.getElementById("num1").value);

            var num2 = Number(document.getElementById("num2").value);

            var num3 = Number(document.getElementById("num3").value);

            let largest;
            // let lar = Math.max(a, b, c);
            console.log(num1)
            console.log(num2)
            console.log(num3)
            if (num1 >= num2 && num1 >= num3) {
                largest = num1;
            }
            else if (num2 >= num1 && num2 >= num3) {
                largest = num2;
            }
            else {
                largest = num3;
            }

            console.log(largest);


        }

    </script>
