<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input from user</title>
    <style>
    </style>
</head>

<body>

    <form action="#" id="FORM1">
        <label for="fname">First Name: </label>
        <input id="fname" type="text"><br><br>
        <label for="lname">Last Name: </label>
        <input id="lname" type="text"><br><br>

        <button onclick="myfun();">Submit</button>
    </form>

    <p id="p1"></p>

    <script>
        function myfun() {
            var f1 = document.getElementById("fname").value;
            var l1 = document.getElementById("lname").value;

            document.getElementById("p1").innerHTML = "first name is: " + f1 + " and last name is: " + l1;

        }
    </script>
</body>

</html>
