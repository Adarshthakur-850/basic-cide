<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>square the number</title>
</head>

<body>

    <div id="text">
        <button onclick="myfun();">Click here for result</button>
        <div id="res"></div>
    </div>

    <script>

        function myfun() {
            var i;
            var e = document.getElementById("res");

            for (i = 1; i <= 20; i++) {
                console.log(i * i)
                e.innerHTML += i + "<sup>2</sup> =" + i * i + "<br>";

            }
        }

    </script>

</body>

</html>
