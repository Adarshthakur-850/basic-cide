<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1em;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }

        .title {
            font-size: 1.5em;
            margin-right: 1em;
        }

        .menu-icon {
            display: none;
            font-size: 1.5em;
            cursor: pointer;
        }

        .navbar-menu {
            display: flex;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .navbar-menu li {
            margin-left: 1em;
        }

        .navbar-menu a {
            color: white;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .menu-icon {
                display: block;
            }

            #navbar-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                width: 200px;
                background-color: #333;
            }

            #navbar-menu.show {
                display: flex;
            }

            .navbar-menu li {
                margin: 0;
            }

            .navbar-menu a {
                padding: 1em;
                display: block;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-brand">
                <span class="title">My Website</span>
                <i class="fas fa-bars menu-icon" id="open-menu"></i>
                <i class="fas fa-times menu-icon" id="close-menu"></i>
            </div>
            <ul class="navbar-menu" id="navbar-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome to My Website</h1>
        <p>This is a responsive web page example with a navigation bar that adapts to different screen sizes.</p>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const openMenu = document.getElementById("open-menu");
            const closeMenu = document.getElementById("close-menu");
            const navbarMenu = document.getElementById("navbar-menu");

            openMenu.addEventListener("click", function() {
                navbarMenu.classList.add("show");
                openMenu.style.display = "none";
                closeMenu.style.display = "block";
            });

            closeMenu.addEventListener("click", function() {
                navbarMenu.classList.remove("show");
                openMenu.style.display = "block";
                closeMenu.style.display = "none";
            });
        });
    </script>
</body>
</html>
