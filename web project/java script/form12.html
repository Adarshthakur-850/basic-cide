<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Credit Card</title>

        .forms {

        .forms h3 {

        }

        .but {
            padding: 6px;
            margin-right: 5px;
        }
    </style>
</head>

    <div class="forms">
        <h3>Credit Card</h3>

        <table>

                    <input type="radio" name="Gender" id="">Visa

                </td>
                <td> <input type="radio" name="Gender" id="">Diners</td>
            </tr>
            <tr>
                <td>
                    Number
                </td>
                <td>
                    <input type="number">
                </td>
            </tr>
            <tr>
                <td>
                    Name
                </td>
                <td>
                    <input type="text">
                </td>

            </tr>
        </table>
        <input type="button" class="but" value="Submit">
        <input type="button" class="but" value="Reset">
    </div>

</body>

</html>
