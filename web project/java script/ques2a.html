<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>=alert box</title>
</head>

<body>



    <div class="link">
        <a href="https://www.google.com/" id="links" target="_blank" onmouseover="fun();">Click here</a>
    </div>


    <script>

        function fun() {
            window.alert("You Hovered over the link");
        }
    </script>
</body>

</html>
