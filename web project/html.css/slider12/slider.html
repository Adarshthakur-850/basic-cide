<!DOCTYPE html>
<html>
<head>
<title>Image Slider</title>
<style>
/* Slider container */
.slider {
  width: 600px;
  height: 400px;
  margin: 0 auto;
}

/* Slider images */
.slider img {
  width: 100%;
  height: 100%;
}

/* Slider controls */
.slider .prev, .slider .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: 40px;
  height: 40px;
  margin-top: -20px;
  background-color: #ccc;
  border-radius: 50%;
  transition: 0.6s ease;
}

.slider .prev {
  left: 0;
}

.slider .next {
  right: 0;
}

/* On hover, add a black background color with a little bit see-through */
.slider .prev:hover, .slider .next:hover {
  background-color: rgba(0,0,0,0.8);
}
</style>
</head>
<body>
<div class="slider">
  <img src="image1.jpg" alt="Image 1">
  <img src="image2.jpg" alt="Image 2">
  <img src="image3.jpg" alt="Image 3">
  <img src="image4.jpg" alt="Image 4">

  <a class="prev" href="#">❮</a>
  <a class="next" href="#">❯</a>
</div>
</body>
</html>
